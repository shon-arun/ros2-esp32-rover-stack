ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: false      # <--- CORRECTED: Must be FALSE to unlock Z, Roll, and Pitch
    publish_tf: true       # (Note: Requires a fix in tick_to_odom.cpp, see below)

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # --- SENSOR 1: Wheel Odometry ---
    odom0: /odom
    # Feed X-velocity and Yaw-velocity from the filtered wheels
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,    # <--- CORRECTED: Now fusing Vyaw (angular.z)
                   false, false, false]

    # --- SENSOR 2: IMU ---
    imu0: /imu/data
    # We feed the EKF everything except absolute X/Y/Z position.
    imu0_config: [false, false, false,
                  true,  true,  true,     # <--- Roll, Pitch, Yaw
                  false, false, false,
                  true,  true,  true,     # <--- Angular Velocities (X, Y, Z)
                  false, false, false]    # <--- Linear Accelerations (Ignored)

    # Redundant since linear acceleration is ignored above, but harmless to leave as true
    imu0_remove_gravitational_acceleration: true
    