ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: false
    publish_tf: true       

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # --- SENSOR 1: Wheel Odometry ---
    odom0: /odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true, false,
                   false, false, true,    
                   false, false, false]

    # --- SENSOR 2: IMU ---
    imu0: /imu/data
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  false, false, false]
    
    # --- SENSOR 3: Visual Odometry from RTAB-Map ---
    odom1: /vo
    odom1_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,
                   true,  true,  true,
                   false, false, false]

    imu0_remove_gravitational_acceleration: true