rtabmap:
  ros__parameters:
    qos_image: 2
    qos_camera_info: 2
    wait_for_transform: 0.2

    subscribe_depth: false
    subscribe_rgb: true
    subscribe_odom: true
    
    frame_id: "base_link"
    odom_frame_id: "odom"
    map_frame_id: "map"
    publish_tf: true

    # Core Strategy
    Rtabmap/DetectionRate: "10"      
    RGBD/LinearUpdate: "0.1"         
    RGBD/AngularUpdate: "0.1"        
    
    # Monocular Grayscale Configuration
    Kp/DetectorStrategy: "2"         # 2=ORB features 
    Vis/FeatureType: "2"             # 2=ORB
    Reg/Strategy: "0"                # 0=Visual Registration
    
    # --- THE REAL FIX: 2 = Pure 2D-2D Epipolar Geometry ---
    Vis/EstimationType: "2"          
    Vis/MinInliers: "15"             
    Vis/MaxFeatures: "1000"          

    RGBD/CreateOccupancyGrid: "false"

rtabmap_viz:
  ros__parameters:
    qos_image: 2
    qos_camera_info: 2
    wait_for_transform: 0.2
    
    subscribe_depth: false
    subscribe_rgb: true
    subscribe_odom: true
    
    frame_id: "base_link"
    odom_frame_id: "odom"